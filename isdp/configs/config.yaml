server:
  port: 8080
  mode: debug

database:
  # 数据库类型: sqlite | mysql
  type: sqlite

  # SQLite配置 (type=sqlite时生效)
  path: ./data/isdp.db

  # MySQL配置 (type=mysql时生效)
  mysql:
    host: ""                    # 华为云RDS地址
    port: 3306
    database: isdp_dev          # 数据库名
    username: ""
    password: ""
    schema: dev_default         # 当前开发者使用的schema
    charset: utf8mb4
    max_open_conns: 10          # 最大连接数
    max_idle_conns: 5           # 最大空闲连接数
    conn_max_lifetime: 300      # 连接最大生命周期(秒)

redis:
  addr: localhost:6379
  password: ""
  db: 0

claude:
  path: claude
  default_model: claude-sonnet-4-6
  timeout: 30m

sandbox:
  port_range_start: 30000
  port_range_end: 40000
  default_cpu_limit: 2
  default_memory_limit: 4096
  network: isdp-network
  repos_dir: ./repos

agent:
  max_depth: 15
  max_retries: 3
  context_max_lines: 400

logging:
  level: info
  format: json

mcp:
  base_url: http://localhost:8080/api/v1/mcp
  token_ttl: 30m