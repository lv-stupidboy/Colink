appId: com.colink.desktop
productName: Colink
directories:
  buildResources: build
  output: release/portable

protocols:
  - name: Colink
    schemes:
      - colink

files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.*"
  - "!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
  - "!release/**"

extraResources:
  - from: "resources/bin"
    to: "bin"
  # 使用 bundle-server.mjs 复制的 web，而不是直接从 web/dist
  - from: "resources/web"
    to: "web"
  - from: "../configs/config.yaml.example"
    to: "data/configs/config.yaml.example"

win:
  target:
    - target: dir
      arch: [x64]
  icon: build/icon.ico
  sign: null

asar: true
asarUnpack:
  - resources/**
npmRebuild: false