appId: com.isdp.launcher
productName: ISDP
directories:
  output: release/launcher

win:
  target:
    - target: dir
      arch: [x64]
  icon: build/icon.ico
  sign: null

asar: true

# 精确控制打包内容，排除不需要的文件
files:
  - "out/**/*"
  - "package.json"
  - "!**/node_modules/**"
  - "!**/src/**"
  - "!**/release/**"
  - "!**/resources/**"
  - "!**/*.ts"

extraResources:
  - from: "build/icon.ico"
    to: "icon.ico"