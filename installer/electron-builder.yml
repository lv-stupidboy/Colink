appId: com.colink.installer
productName: Colink Setup
directories:
  output: release

win:
  target:
    - target: dir
      arch: [x64]
  icon: build/icon.ico
  sign: null

asar: true

# 精确控制打包内容
files:
  - "out/**/*"
  - "package.json"
  - "!**/node_modules/**"
  - "!**/src/**"
  - "!**/resources/**"

extraResources:
  # 图标
  - from: "build/icon.ico"
    to: "icon.ico"
  # 安装器配置
  - from: "resources/installer-config.json"
    to: "installer-config.json"
  # 版本号文件
  - from: "../VERSION"
    to: "runtime/VERSION"
  # 后端服务（从 bin 目录读取构建产物）
  - from: "../bin/colink-server.exe"
    to: "runtime/colink-server.exe"
  # 迁移工具（从 bin 目录读取构建产物）
  - from: "../bin/migrate.exe"
    to: "runtime/tools/migrate.exe"
  # SQL 变更脚本（初始化和版本迁移）
  - from: "../sql-change"
    to: "runtime/data/sql-change"
  # 前端静态文件（从 Go 项目的 web 目录读取）
  - from: "../web/dist"
    to: "runtime/web"
  # 配置模板（用于升级时配置合并）
  - from: "../configs/config.yaml.example"
    to: "runtime/data/configs/config.yaml.example"
  # 启动器（从 release/launcher/win-unpacked/ 复制）
  - from: "release/launcher/win-unpacked"
    to: "launcher"