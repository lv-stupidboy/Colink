appId: com.colink.installer
productName: Colink Setup
directories:
  output: release

win:
  target:
    - target: dir
      arch: [x64]
  icon: build/icon.ico
  sign: null

asar: true

# 精确控制打包内容
files:
  - "out/**/*"
  - "package.json"
  - "!**/node_modules/**"
  - "!**/src/**"
  - "!**/resources/**"

extraResources:
  # Setup 必要文件
  - from: "build/icon.ico"
    to: "icon.ico"
  - from: "resources/installer-config.json"
    to: "installer-config.json"

  # 程序文件（packages分离结构）
  - from: "../VERSION"
    to: "../packages/VERSION"
  # 迁移工具
  - from: "../bin/migrate.exe"
    to: "../packages/runtime/tools/migrate.exe"
  # MCP Server（用于 Agent 记忆工具调用）
  - from: "../bin/mcp-server.exe"
    to: "../packages/runtime/tools/mcp-server.exe"
  # SQL 变更脚本
  - from: "../sql-change"
    to: "../packages/runtime/data/sql-change"
  # 配置模板
  - from: "../configs/config.yaml.example"
    to: "../packages/runtime/data/configs/config.yaml.example"
  # 桌面版应用
  - from: "packages/desktop"
    to: "../packages/desktop"