appId: com.isdp.installer
productName: ISDP
directories:
  output: release

win:
  target:
    - target: dir
      arch: [x64]
  icon: build/icon.ico
  sign: null

asar: true

extraResources:
  - from: "build/icon.ico"
    to: "icon.ico"
  - from: "resources/app/isdp-server.exe"
    to: "isdp-server.exe"
  - from: "resources/app/web"
    to: "web"
    filter:
      - "**/*"