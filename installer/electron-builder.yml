appId: com.isdp.installer
productName: ISDP Setup
directories:
  output: release

win:
  target:
    - target: dir
      arch: [x64]
  icon: build/icon.ico
  sign: null

asar: true

# 精确控制打包内容
files:
  - "out/**/*"
  - "package.json"
  - "!**/node_modules/**"
  - "!**/src/**"
  - "!**/resources/**"

extraResources:
  # 后端服务
  - from: "resources/app/isdp-server.exe"
    to: "runtime/isdp-server.exe"
  # 前端静态文件
  - from: "resources/app/web"
    to: "runtime/web"
  # 启动器（从 release/launcher/ 复制）
  - from: "release/launcher"
    to: "launcher"