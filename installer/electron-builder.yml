appId: com.colink.installer
productName: Colink Setup
directories:
  output: release

win:
  target:
    - target: dir
      arch: [x64]
  icon: build/icon.ico
  sign: null

asar: true

# 精确控制打包内容
files:
  - "out/**/*"
  - "package.json"
  - "!**/node_modules/**"
  - "!**/src/**"
  - "!**/resources/**"

extraResources:
  # Setup 必要文件（直接放在 resources 下）
  - from: "build/icon.ico"
    to: "icon.ico"
  - from: "resources/installer-config.json"
    to: "installer-config.json"

  # 新版本程序文件（放在 packages 目录下，与 resources 并列）
  - from: "../VERSION"
    to: "../packages/VERSION"
  # 后端服务
  - from: "../bin/colink-server.exe"
    to: "../packages/runtime/colink-server.exe"
  # 迁移工具
  - from: "../bin/migrate.exe"
    to: "../packages/runtime/tools/migrate.exe"
  # SQL 变更脚本
  - from: "../sql-change"
    to: "../packages/runtime/data/sql-change"
  # 前端静态文件
  - from: "../web/dist"
    to: "../packages/runtime/web"
  # 配置模板
  - from: "../configs/config.yaml.example"
    to: "../packages/runtime/data/configs/config.yaml.example"
  # 启动器
  - from: "release/launcher/win-unpacked"
    to: "../packages/launcher"