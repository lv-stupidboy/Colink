appId: com.isdp.installer
productName: ISDP Setup
directories:
  output: release

win:
  target:
    - target: dir
      arch: [x64]
  icon: build/icon.ico
  sign: null

asar: true

# 精确控制打包内容
files:
  - "out/**/*"
  - "package.json"
  - "!**/node_modules/**"
  - "!**/src/**"
  - "!**/resources/**"

extraResources:
  # 图标
  - from: "build/icon.ico"
    to: "icon.ico"
  # 后端服务（直接从 Go 项目读取）
  - from: "../isdp/isdp-server.exe"
    to: "runtime/isdp-server.exe"
  # 前端静态文件（从 Go 项目的 web 目录读取）
  - from: "../isdp/web/dist"
    to: "runtime/web"
  # 启动器（从 release/launcher/win-unpacked/ 复制）
  - from: "release/launcher/win-unpacked"
    to: "launcher"